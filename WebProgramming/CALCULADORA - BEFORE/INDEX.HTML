<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALCULADORA</title>
    <link rel="stylesheet" href="STYLES.CSS">
    <link rel="icon" href="ICON.png">
</head>
<body>
    <nav class="nav">
        <ul>
            
            <li class="nav-item">
                <a href="" class="nav-link">Home</a>
            </li>
            <li class="nav-item">
                <a href="" class="nav-link">About Us</a>
            </li>
            <li class="nav-item">
                <a href="" class="nav-link">Help</a>
            </li>
            <li class="nav-item">
                <a href="" class="nav-link">Contact</a> 
            </li>
            <li class="nav-item">
                <a href="" class="nav-link nav-button">Log In</a>
            </li>
            <li class="nav-item nav-name">
                CALCULADORA
            </li>
        </ul>
    </nav>
    <div class="buttons">
        <div class="screen">I</div>
        <button class="operator">AC</button>
        <button class="operator">(</button>
        <button class="operator">)</button>
        <button class="operator">÷</button>
        <button>1</button>
        <button>2</button>
        <button>4</button>
        <button class="operator">x</button>
        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button class="operator">+</button>
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button class="operator">%</button>
        <button class="operator">+/-</button>
        <button>0</button>
        <button class="operator">.</button>
        <button class="operator">=</button>
    </div>
    <script>
        const buttons = document.querySelectorAll('button');
        const screen = document.querySelector('.screen');
        let screenValue = '';

        buttons.forEach(button => {
            button.addEventListener('click', (e) => {
                const buttonText = e.target.innerText;
                
                if (buttonText === 'AC') {
                    screenValue = '';
                    screen.innerText = screenValue;
                } else if (buttonText === '=') {
                    try {
                        screenValue = screenValue.replace(/x/g, '*').replace(/÷/g, '/');
                        screen.innerText = eval(screenValue);
                    } catch {
                        screen.innerText = 'Error';
                    }
                } else if (buttonText === '+/-') {
                    if (screenValue) {
                        screenValue = `${-1 * parseFloat(screenValue)}`;
                        screen.innerText = screenValue;
                    }
                } else {
                    screenValue += buttonText;
                    screen.innerText = screenValue;
                }
            });
        });
    </script>
</body>
</html>
